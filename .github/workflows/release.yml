name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 划译 ${{ github.ref_name }}
          releaseBody: |
            Windows x64 安装包。安装后从托盘打开设置，填写 API Key 即可使用。

            快捷键：`Ctrl + Alt + T`（先选中中文）
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
